version: '3.8'

services:
  postgres:
    build: ./database
    environment:
      POSTGRES_INITDB_ARGS: "-U postgres"
      POSTGRES_PASSWORD: postgres
      WORKSHOP_USER_PASSWORD: workshop_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/flyway/sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop_user -d workshop_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://workshop_user:workshop_pass@postgres:5432/workshop_db
      APP_ENV: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
