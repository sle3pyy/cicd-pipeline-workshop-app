name: ci-database

on:
  push:
    branches: [main]
    paths:
      - "database/**"
  pull_request:
    branches: [main]
    paths:
      - "database/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate migration file naming convention
        run: |
          cd database/migrations
          for f in *.sql; do
            if ! echo "$f" | grep -qE '^V[0-9]+(\.[0-9]+)?__[a-zA-Z0-9_]+\.sql$'; then
              echo "Invalid migration filename: $f"
              echo "Expected format: V<version>__<description>.sql"
              exit 1
            fi
          done
          echo "All migration filenames are valid"
  build:
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check required secrets exist
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || (echo "DOCKERHUB_USERNAME is missing" && exit 1)
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || (echo "DOCKERHUB_TOKEN is missing" && exit 1)
          echo "Required secrets are configured"

      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push database image
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/database:${{ github.sha }}

  # TODO: Add a build-and-push job that:
  #   - Runs only after the validate job passes
  #   - Runs only on push to main (not on pull requests)
  #   - Logs in to Docker Hub using DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets
  #   - Builds the Docker image from ./database
  #   - Pushes the image tagged with the commit SHA
